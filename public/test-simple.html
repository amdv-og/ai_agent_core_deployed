<!DOCTYPE html>
<html>
<head>
    <title>Simple API Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { padding: 10px 20px; font-size: 16px; margin: 5px; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Simple API Connection Test</h1>

    <button onclick="testConnection()">1. Test Connection</button>
    <button onclick="testCORS()">2. Test CORS</button>
    <button onclick="testUpload()">3. Test Upload (no file)</button>

    <div id="result">Click a button to test...</div>

    <script>
        async function testConnection() {
            const result = document.getElementById('result');
            result.textContent = 'Testing connection...';

            try {
                const response = await fetch('http://localhost:3000', {
                    method: 'GET'
                });
                result.textContent = `✅ Connection OK!\n\nStatus: ${response.status}\nHeaders: ${JSON.stringify(Array.from(response.headers.entries()), null, 2)}`;
            } catch (error) {
                result.textContent = `❌ Connection Failed!\n\nError: ${error.message}`;
            }
        }

        async function testCORS() {
            const result = document.getElementById('result');
            result.textContent = 'Testing CORS...';

            try {
                const response = await fetch('http://localhost:3000/index', {
                    method: 'POST'
                });
                const text = await response.text();
                result.textContent = `✅ CORS OK!\n\nStatus: ${response.status}\nContent-Type: ${response.headers.get('content-type')}\n\nResponse:\n${text.substring(0, 500)}`;
            } catch (error) {
                result.textContent = `❌ CORS Failed!\n\nError: ${error.message}`;
            }
        }

        async function testUpload() {
            const result = document.getElementById('result');
            result.textContent = 'Testing upload endpoint...';

            const formData = new FormData();
            formData.append('choice', JSON.stringify({
                items: [{ service: 'Recognition', level: 1 }]
            }));

            try {
                const response = await fetch('http://localhost:3000/index', {
                    method: 'POST',
                    body: formData
                });

                const contentType = response.headers.get('content-type');
                result.textContent = `Status: ${response.status}\nContent-Type: ${contentType}\n\n`;

                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    result.textContent += 'Response (JSON):\n' + JSON.stringify(data, null, 2);
                } else {
                    const text = await response.text();
                    result.textContent += 'Response (Text):\n' + text.substring(0, 500);
                }
            } catch (error) {
                result.textContent = `❌ Upload Test Failed!\n\nError: ${error.message}\n\n${error.stack}`;
            }
        }
    </script>
</body>
</html>
